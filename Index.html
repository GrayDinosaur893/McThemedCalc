<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Functional Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

<div class="calculator">
    <h2 class="h2">Functional Boolean Calculator</h2>

    <div class="wrap">
        <input type="text" class="answer" readonly>

        <div class="buttons">
            <button data-value="1">1</button>
            <button data-value="2">2</button>
            <button data-value="3">3</button>
            <button data-value="+">+</button>

            <button data-value="4">4</button>
            <button data-value="5">5</button>
            <button data-value="6">6</button>
            <button data-value="-">-</button>

            <button data-value="7">7</button>
            <button data-value="8">8</button>
            <button data-value="9">9</button>
            <button data-value="*">*</button>

            <button data-action="clear">C</button>
            <button data-value="0">0</button>
            <button data-value="/">/</button>
            <button data-action="equals">=</button>
            <button data-action="binary">BIN</button>
            <button data-action="delete">DEL</button>

        
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
